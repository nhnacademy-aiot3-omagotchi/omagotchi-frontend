<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omagotchi Login</title>

    <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
<main class="login-page">
    <section class="login-card">

        <div class="brand-panel">
            <header class="brand-header">
                <img class="logo-image"
                     src="/images/logo.png"
                     alt="Omagotchi Logo">
            </header>

            <div class="character-zone">
                <div class="speech-bubble">
                    어서 와요!<br />
                    오늘의 성장을 시작해요
                </div>

                <img class="omagotchi-character"
                     src="/images/normal_character.png"
                     alt="Omagotchi">
            </div>

            <p class="brand-message">
                실습실에서 성장하는 나의 오마고치
            </p>
        </div>

        <div class="form-panel">
            <form class="login-form" action="#" method="post">
                <h2>Login</h2>

                <label class="input-group">
                    <span>아이디</span>
                    <input type="text" name="loginId" placeholder="아이디를 입력하세요" />
                </label>

                <label class="input-group">
                    <span>비밀번호</span>
                    <input type="password" name="password" placeholder="비밀번호를 입력하세요" />
                </label>

                <button class="login-button" type="submit">
                    로그인
                </button>

                <div class="login-links">
                    <span class="login-link-group">
                        <a href="/register">회원가입</a>
                        <a href="/passwordChange">비밀번호 변경</a>
                    </span>
                    <a href="/managerLogin">관리자 로그인</a>
                </div>
            </form>
        </div>

    </section>
</main>

<script src="/js/login.js"></script>
</body>
</html>
