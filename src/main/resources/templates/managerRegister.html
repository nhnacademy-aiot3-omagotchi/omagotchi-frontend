<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omagotchi Manager Register</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
<main class="login-page">
    <section class="login-card manager-card manager-register-card">

        <div class="brand-panel manager-brand-panel">
            <header class="brand-header">
                <img class="logo-image"
                     src="/images/logo.png"
                     alt="Omagotchi Logo">
            </header>

            <div class="character-zone">
                <div class="speech-bubble manager-bubble">
                    안 보는 것 같아도<br />
                    다 보입니다!
                </div>
                <img class="manager-character-img"
                     src="/images/manager_character.gif"
                     alt="관리자 캐릭터">
            </div>

            <p class="brand-message">
                실습실에서 성장하는 나의 오마고치
            </p>
        </div>

        <div class="form-panel manager-form-panel">
            <form class="auth-form manager-register-form" action="#" method="post">
                <h2>Manager<br />Register</h2>

                <label class="input-group">
                    <span>이메일</span>
                    <input type="email" name="email" placeholder="이메일을 입력하세요" autocomplete="username" />
                </label>

                <label class="input-group">
                    <span>비밀번호</span>
                    <input type="password" name="password" placeholder="비밀번호를 입력하세요" />
                </label>

                <label class="input-group">
                    <span>사용자 이름</span>
                    <input type="text" name="username" placeholder="사용자 이름을 입력하세요" />
                </label>

                <label class="input-group">
                    <span>소속 기관</span>
                    <input type="text" name="organ" placeholder="소속 기관을 입력하세요" />
                </label>

                <button class="auth-button register-button" type="submit">
                    관리자 등록
                </button>

                <div class="auth-links">
                    <a href="/managerLogin">관리자 로그인으로 돌아가기</a>
                </div>
            </form>
        </div>

    </section>
</main>

<script src="/js/managerRegister.js"></script>
</body>
</html>
