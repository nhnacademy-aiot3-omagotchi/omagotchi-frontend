<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omagotchi Password Change</title>

    <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
<main class="login-page">
    <section class="login-card">

        <div class="brand-panel">
            <header class="brand-header">
                <img class="logo-image"
                     src="/images/logo.png"
                     alt="Omagotchi Logo">
            </header>

            <div class="character-zone">
                <div class="speech-bubble">
                    이메일을 먼저<br />
                    확인해볼게요.
                </div>
                <img class="omagotchi-character"
                     src="/images/normal_character.png"
                     alt="Omagotchi">
            </div>

            <p class="brand-message">
                계정 확인 후 새 비밀번호를 설정하세요
            </p>
        </div>

        <div class="form-panel">
            <form class="auth-form password-change-form" action="#" method="post">
                <h2>비밀번호 변경</h2>

                <div class="password-step is-active" data-password-step="lookup">
                    <label class="input-group">
                        <span>이메일</span>
                        <input type="email" name="email" placeholder="사용자 이메일을 입력해주세요." autocomplete="username" />
                    </label>

                    <button class="auth-button" type="button" data-check-user-button>
                        이메일 확인
                    </button>
                </div>

                <div class="password-step" data-password-step="change" aria-hidden="true">
                    <label class="input-group">
                        <span>새 비밀번호</span>
                        <input type="password" name="newPassword" placeholder="새 비밀번호를 입력하세요" autocomplete="new-password" />
                    </label>

                    <label class="input-group">
                        <span>새 비밀번호 확인</span>
                        <input type="password" name="confirmPassword" placeholder="새 비밀번호를 다시 입력하세요" autocomplete="new-password" />
                    </label>

                    <button class="auth-button" type="submit">
                        비밀번호 변경하기
                    </button>
                </div>

                <div class="auth-links">
                    <a href="/login">로그인으로 돌아가기</a>
                </div>
            </form>
        </div>

    </section>
</main>

<script src="/js/passwordChange.js"></script>
</body>
</html>
