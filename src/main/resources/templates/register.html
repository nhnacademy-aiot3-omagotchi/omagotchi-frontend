<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omagotchi Login</title>

    <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
<main class="login-page">
    <section class="login-card">

        <div class="brand-panel">
            <header class="brand-header">
                <img class="logo-image"
                     src="/images/logo.png"
                     alt="Omagotchi Logo">
            </header>

            <div class="character-zone">
                <div class="speech-bubble">
                    오늘도 실습실에서<br />
                    성장해볼까요?
                </div>
                <img class="omagotchi-character"
                     src="/images/normal_character.png"
                     alt="Omagotchi">
            </div>

            <p class="brand-message">
                실습실에서 성장하는 나의 오마고치
            </p>
        </div>

        <div class="form-panel">
            <form class="auth-form register-form" action="#" method="post">
                <h2>Register</h2>

                <label class="input-group">
                    <span>아이디</span>
                    <input type="text" name="loginId" placeholder="아이디를 입력하세요" />
                </label>

                <label class="input-group">
                    <span>비밀번호</span>
                    <input type="password" name="password" placeholder="비밀번호를 입력하세요" />
                </label>

                <label class="input-group">
                    <span>사용자 이름</span>
                    <input type="text" name="username" placeholder="사용자 이름을 입력하세요" />
                </label>

                <button class="auth-button register-button" type="submit">
                    회원가입
                </button>

                <div class="auth-links">
                    <a href="/login">로그인으로 돌아가기</a>
                </div>
            </form>
        </div>

    </section>
</main>

<script src="/js/register.js"></script>
</body>
</html>
