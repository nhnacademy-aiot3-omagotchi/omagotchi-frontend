<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omagotchi Home</title>

  <link rel="stylesheet" href="/css/auth.css" />
  <link rel="stylesheet" href="/css/home.css" />
</head>
<body>
<main class="home-page">
  <section class="home-shell" aria-label="오마고치 홈">
    <aside class="profile-panel">
      <div class="profile-summary">
        <button class="profile-icon" type="button" aria-label="캐릭터 정보 보기">
          <img
                  data-home-profile-image
                  src="/images/characters/study/study.png"
                  alt=""
          />
        </button>

        <div class="profile-copy">
          <span class="badge-label">뱃지</span>
          <strong data-home-user-name>유저 이름</strong>
          <span>Lv.1</span>
        </div>
      </div>

      <div class="exp-status">
        <div class="exp-bar" aria-label="경험치">
          <span style="width: 0%"></span>
        </div>
        <strong>0 / 1000 exp</strong>
      </div>

      <section class="quest-panel" aria-labelledby="today-quest-title">
        <h2 id="today-quest-title">오늘의 퀘스트</h2>

        <ul class="quest-list">
          <li>
            <span class="reward-icon">보상<br />icon</span>
            <div>
              <strong>퀘스트 명</strong>
              <span>+ 보상이름</span>
            </div>
          </li>
          <li>
            <span class="reward-icon">보상<br />icon</span>
            <div>
              <strong>퀘스트 명</strong>
              <span>+ 보상이름</span>
            </div>
          </li>
          <li>
            <span class="reward-icon">보상<br />icon</span>
            <div>
              <strong>퀘스트 명</strong>
              <span>+ 보상이름</span>
            </div>
          </li>
        </ul>
      </section>
    </aside>

    <section class="character-stage" aria-live="polite">
      <div class="home-bubble" data-home-bubble>준비 완료!<br />실습을 시작해요.</div>
      <img
              class="home-character"
              data-home-character
              src="/images/characters/study/study.png"
              alt="선택한 오마고치"
      />
      <div class="room-shadow" aria-hidden="true"></div>
    </section>

    <button class="hamburger-button" type="button" data-menu-button aria-label="메뉴 열기" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <a class="lab-link" href="#" aria-label="실습실로 이동">실습실로 이동</a>

    <aside class="menu-overlay" data-menu-overlay aria-hidden="true">
      <div class="menu-grid" role="menu" aria-label="홈 메뉴">
        <button type="button" role="menuitem">
          <span class="menu-icon">✓</span>
          출석체크
        </button>
        <button type="button" role="menuitem">
          <span class="menu-icon">▥</span>
          랭크
        </button>
        <button type="button" role="menuitem">
          <span class="menu-icon">♜</span>
          뱃지
        </button>
        <button type="button" role="menuitem">
          <span class="menu-icon">▣</span>
          도감
        </button>
        <button type="button" role="menuitem">
          <span class="menu-icon">⚙</span>
          설정
        </button>
        <button type="button" role="menuitem">
          <span class="menu-icon">?</span>
          도움말
        </button>
      </div>
    </aside>
  </section>
</main>

<script src="/js/home.js"></script>
</body>
</html>
