<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Omagotchi</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body class="landing-body">
<main class="landing-page">
    <section class="landing-panel" aria-labelledby="page-title">
        <div class="landing-brand">
            <img class="landing-logo"
                 th:src="@{/images/logo.png}"
                 alt="Omagotchi Logo">
        </div>

        <div class="landing-character-zone">
            <div class="landing-speech">
                실습실에서<br>
                나만의 오마고치를 키워요
            </div>

            <img class="landing-character"
                 th:src="@{/images/normal_character.png}"
                 alt="Omagotchi">
        </div>

        <div class="landing-copy">
            <h1 id="page-title">Omagotchi</h1>
            <p>출석, 활동, 성장 기록을 이어가는 실습실 성장 파트너</p>
        </div>

        <a class="start-button" th:href="@{/login}">시작하기</a>
    </section>
</main>
</body>
</html>
