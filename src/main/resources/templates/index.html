<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omagotchi</title>

    <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
<main class="login-page">
    <section class="login-card index-card" aria-labelledby="index-title">

        <div class="brand-panel">
            <header class="brand-header">
                <img class="logo-image"
                     src="/images/logo.png"
                     alt="Omagotchi Logo">
            </header>

            <div class="character-zone">
                <div class="speech-bubble">
                    어서 와요!<br />
                    오늘의 성장을 시작해요
                </div>

                <img class="omagotchi-character"
                     src="/images/normal_character.png"
                     alt="Omagotchi">
            </div>

            <p class="brand-message">
                실습실에서 성장하는 나의 오마고치
            </p>
        </div>

        <div class="form-panel">
            <section class="index-entry" aria-labelledby="index-title">
                <p class="index-eyebrow">Study · Grow · Level Up</p>
                <h1 id="index-title">Omagotchi</h1>
                <p class="index-description">
                    출석과 학습 기록으로 캐릭터를 성장시키고<br />
                    오늘의 퀘스트를 완료해보세요.
                </p>

                <div class="index-actions" aria-label="시작 메뉴">
                    <a class="login-button index-primary-action" href="/login">시작하기</a>
                    <a class="index-sub-action" href="/register">회원가입</a>
                    <a class="index-sub-action" href="/managerLogin">관리자 로그인</a>
                </div>
            </section>
        </div>

    </section>
</main>

<script src="/js/app.js"></script>
</body>
</html>
